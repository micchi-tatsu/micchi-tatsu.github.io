<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声入力</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --border: #252a35;
    --accent: #00e5a0;
    --accent2: #005f42;
    --danger: #ff4560;
    --text: #e8eaf0;
    --muted: #6b7280;
    --pulse: rgba(0, 229, 160, 0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
    position: relative;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
  }

  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .header p {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Mic button area */
  .mic-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .mic-wrapper {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Pulse rings */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.3s;
  }
  .ring-1 { width: 100%; height: 100%; }
  .ring-2 { width: 130%; height: 130%; }
  .ring-3 { width: 160%; height: 160%; }

  .recording .ring-1 { animation: pulse 2s ease-out infinite; }
  .recording .ring-2 { animation: pulse 2s ease-out 0.4s infinite; }
  .recording .ring-3 { animation: pulse 2s ease-out 0.8s infinite; }

  @keyframes pulse {
    0% { opacity: 0.7; transform: scale(0.85); }
    100% { opacity: 0; transform: scale(1.2); }
  }

  .mic-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    z-index: 1;
    outline: none;
    box-shadow: 0 0 0 0 var(--pulse), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .mic-btn:hover {
    background: var(--accent2);
    transform: scale(1.06);
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .mic-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 40px rgba(0,229,160,0.4);
    transform: scale(1.08);
  }

  .mic-btn.active .mic-icon { color: #0d0f14; }

  .mic-btn svg {
    width: 38px;
    height: 38px;
    color: var(--accent);
    transition: color 0.2s;
  }

  /* Waveform visualizer */
  .visualizer {
    width: 200px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }

  .bar {
    width: 4px;
    border-radius: 2px;
    background: var(--accent);
    opacity: 0.3;
    height: 4px;
    transition: height 0.1s ease, opacity 0.1s;
  }

  .recording .bar {
    opacity: 1;
    animation: wave 0.8s ease-in-out infinite alternate;
  }

  .bar:nth-child(1)  { animation-delay: 0s; }
  .bar:nth-child(2)  { animation-delay: 0.07s; }
  .bar:nth-child(3)  { animation-delay: 0.14s; }
  .bar:nth-child(4)  { animation-delay: 0.21s; }
  .bar:nth-child(5)  { animation-delay: 0.28s; }
  .bar:nth-child(6)  { animation-delay: 0.35s; }
  .bar:nth-child(7)  { animation-delay: 0.28s; }
  .bar:nth-child(8)  { animation-delay: 0.21s; }
  .bar:nth-child(9)  { animation-delay: 0.14s; }
  .bar:nth-child(10) { animation-delay: 0.07s; }
  .bar:nth-child(11) { animation-delay: 0s; }
  .bar:nth-child(12) { animation-delay: 0.07s; }
  .bar:nth-child(13) { animation-delay: 0.14s; }

  @keyframes wave {
    0%   { height: 4px; }
    100% { height: 36px; }
  }

  /* Status label */
  .status {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    transition: all 0.3s;
    min-height: 1.2em;
  }

  .status.on { color: var(--accent); }
  .status.err { color: var(--danger); }

  /* Transcript box */
  .transcript-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    min-height: 120px;
    position: relative;
    transition: border-color 0.3s;
  }

  .transcript-box.active {
    border-color: var(--accent2);
  }

  .transcript-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.7rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .transcript-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  .transcript-box.active .transcript-label::before {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  #transcript-text {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text);
    min-height: 3em;
    word-break: break-all;
  }

  .interim {
    color: var(--muted);
    font-style: italic;
  }

  .placeholder {
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* Actions */
  .actions {
    display: flex;
    gap: 0.75rem;
    width: 100%;
  }

  .btn {
    flex: 1;
    padding: 0.65rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,160,0.05);
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Not supported */
  .not-supported {
    background: rgba(255,69,96,0.1);
    border: 1px solid var(--danger);
    border-radius: 8px;
    padding: 1rem 1.4rem;
    color: var(--danger);
    font-size: 0.85rem;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Voice Input</h1>
    <p>ボタンを押して話しかけてください</p>
  </div>

  <div class="mic-area" id="micArea">
    <div class="mic-wrapper" id="micWrapper">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <button class="mic-btn" id="micBtn" title="音声入力を開始">
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
    </div>

    <div class="visualizer" id="visualizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div class="status" id="status">マイクをクリックして開始</div>
  </div>

  <div class="transcript-box" id="transcriptBox">
    <div class="transcript-label" id="transcriptLabel">Transcript</div>
    <div id="transcript-text"><span class="placeholder">認識した文字がここに表示されます...</span></div>
  </div>

  <div class="actions">
    <button class="btn" id="copyBtn" disabled>コピー</button>
    <button class="btn" id="clearBtn" disabled>クリア</button>
  </div>
</div>

<script>
const micBtn = document.getElementById('micBtn');
const micWrapper = document.getElementById('micWrapper');
const visualizer = document.getElementById('visualizer');
const statusEl = document.getElementById('status');
const transcriptBox = document.getElementById('transcriptBox');
const transcriptText = document.getElementById('transcript-text');
const copyBtn = document.getElementById('copyBtn');
const clearBtn = document.getElementById('clearBtn');

let recognition = null;
let isRecording = false;
let finalText = '';

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  micBtn.disabled = true;
  statusEl.textContent = '非対応ブラウザです';
  statusEl.classList.add('err');
  transcriptText.innerHTML = '<span class="not-supported">このブラウザはWeb Speech APIに対応していません。<br>Chrome または Edge をお使いください。</span>';
} else {
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('active');
    micWrapper.classList.add('recording');
    visualizer.classList.add('recording');
    statusEl.textContent = '録音中...';
    statusEl.classList.add('on');
    transcriptBox.classList.add('active');
  };

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalText += t;
      } else {
        interim += t;
      }
    }
    transcriptText.innerHTML =
      (finalText ? `<span>${escHtml(finalText)}</span>` : '') +
      (interim ? `<span class="interim">${escHtml(interim)}</span>` : '');

    const hasContent = finalText || interim;
    copyBtn.disabled = !finalText;
    clearBtn.disabled = !hasContent;
  };

  recognition.onerror = (event) => {
    const msgs = {
      'not-allowed': 'マイクの許可が必要です',
      'no-speech': '音声が検出されませんでした',
      'network': 'ネットワークエラー',
      'aborted': '中断されました',
    };
    statusEl.textContent = msgs[event.error] || `エラー: ${event.error}`;
    statusEl.classList.remove('on');
    statusEl.classList.add('err');
    stopRecording();
  };

  recognition.onend = () => {
    if (isRecording) {
      // continuous reconnect
      try { recognition.start(); } catch(e) { stopRecording(); }
    }
  };

  micBtn.addEventListener('click', () => {
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  });

  function startRecording() {
    finalText = '';
    transcriptText.innerHTML = '<span class="placeholder">認識中...</span>';
    copyBtn.disabled = true;
    clearBtn.disabled = true;
    statusEl.classList.remove('err');
    try {
      recognition.start();
    } catch(e) {
      statusEl.textContent = '起動エラー';
      statusEl.classList.add('err');
    }
  }

  function stopRecording() {
    isRecording = false;
    recognition.stop();
    micBtn.classList.remove('active');
    micWrapper.classList.remove('recording');
    visualizer.classList.remove('recording');
    transcriptBox.classList.remove('active');
    statusEl.textContent = finalText ? '完了' : 'マイクをクリックして開始';
    statusEl.classList.remove('on');

    if (!finalText) {
      transcriptText.innerHTML = '<span class="placeholder">認識した文字がここに表示されます...</span>';
    }
    copyBtn.disabled = !finalText;
    clearBtn.disabled = !finalText;
  }

  copyBtn.addEventListener('click', () => {
    if (!finalText) return;
    navigator.clipboard.writeText(finalText).then(() => {
      const orig = copyBtn.textContent;
      copyBtn.textContent = 'コピー完了!';
      setTimeout(() => copyBtn.textContent = orig, 1500);
    });
  });

  clearBtn.addEventListener('click', () => {
    finalText = '';
    transcriptText.innerHTML = '<span class="placeholder">認識した文字がここに表示されます...</span>';
    copyBtn.disabled = true;
    clearBtn.disabled = true;
    if (!isRecording) statusEl.textContent = 'マイクをクリックして開始';
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
