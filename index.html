<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 ArduinoIDE デバッグ診断ツリー v3.0</title>
<style>
:root {
  --bg: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --border: #30363d;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --text-bright: #f0f6fc;
  --accent-blue: #58a6ff;
  --accent-green: #3fb950;
  --accent-yellow: #d29922;
  --accent-red: #f85149;
  --accent-purple: #bc8cff;
  --accent-orange: #ffa657;
  --accent-cyan: #39d353;
  --cat1: #f85149; /* crash */
  --cat2: #ffa657; /* data corrupt */
  --cat3: #d29922; /* intermittent */
  --cat4: #bc8cff; /* task hang */
  --cat5: #39d353; /* degradation */
  --cat6: #58a6ff; /* comms */
  --cat7: #ff7b72; /* hardware */
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif;
  min-height: 100vh;
  padding: 20px;
}
.app-header {
  text-align: center;
  padding: 32px 16px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.app-header h1 {
  font-size: 1.6rem;
  color: var(--text-bright);
  font-weight: 700;
  margin-bottom: 8px;
}
.app-header p {
  color: var(--text-muted);
  font-size: 0.9rem;
}
.version-badge {
  display: inline-block;
  background: var(--accent-blue);
  color: #000;
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 700;
  margin-left: 8px;
  vertical-align: middle;
}
/* Progress */
#progress-bar-wrap {
  max-width: 760px;
  margin: 0 auto 16px;
  display: none;
}
.progress-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.progress-bar-bg {
  height: 4px;
  background: var(--bg-tertiary);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--accent-blue);
  border-radius: 2px;
  transition: width 0.4s ease;
}
/* Breadcrumb */
#breadcrumb {
  max-width: 760px;
  margin: 0 auto 16px;
  font-size: 0.8rem;
  color: var(--text-muted);
  display: none;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
#breadcrumb span { color: var(--text-muted); }
#breadcrumb .crumb {
  color: var(--accent-blue);
  cursor: pointer;
  text-decoration: underline;
}
/* Hardware checklist banner */
#hw-checklist-banner {
  max-width: 760px;
  margin: 0 auto 20px;
  background: var(--bg-secondary);
  border: 1px solid var(--accent-yellow);
  border-radius: 10px;
  padding: 16px 20px;
  display: none;
}
#hw-checklist-banner h3 {
  color: var(--accent-yellow);
  font-size: 0.9rem;
  margin-bottom: 10px;
}
.hw-check-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.hw-check-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 0.8rem;
  color: var(--text);
}
.hw-check-item input[type=checkbox] {
  margin-top: 2px;
  accent-color: var(--accent-yellow);
}
@media (max-width: 600px) { .hw-check-grid { grid-template-columns: 1fr; } }
@media (max-width: 600px) {
  .node-card {
    padding: 16px;
    font-size: 0.9rem;
  }
  .node-card h2 {
    font-size: 1.0rem;
  }
  .node-card p {
    font-size: 0.88rem;
  }
}
/* Main container */
#tree-container {
  max-width: 760px;
  margin: 0 auto;
}
/* Node card */
.node-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
.node-card h2 {
  font-size: 1.15rem;
  color: var(--text-bright);
  margin-bottom: 16px;
  line-height: 1.5;
}
.node-card p {
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 12px;
  font-size: 0.9rem;
}
/* Category select */
.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}
@media (max-width: 560px) { .cat-grid { grid-template-columns: 1fr; } }
.cat-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  color: var(--text);
}
.cat-btn:hover {
  border-color: var(--accent);
  background: var(--bg);
  transform: translateY(-2px);
}
.cat-btn .cat-icon { display: none; }
.cat-btn .cat-name {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-bright);
  display: block;
  margin-bottom: 4px;
}
.cat-btn .cat-desc { font-size: 0.78rem; color: var(--text-muted); }
/* Choices */
.choice-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.choice-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 13px 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  color: var(--text);
  font-size: 0.88rem;
  font-family: -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif;
  line-height: 1.5;
}
.choice-btn:hover {
  border-color: var(--accent-blue);
  color: var(--text-bright);
  background: var(--bg);
}
/* Result node */
.result-card {
  background: var(--bg-secondary);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  animation: fadeIn 0.3s ease;
}
.severity-badge {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 12px;
  margin-bottom: 12px;
  font-family: 'SFMono-Regular', 'Consolas', monospace;
}
.sev-high { background: #f8514930; color: #f85149; border: 1px solid #f85149; }
.sev-medium { background: #d2992230; color: #d29922; border: 1px solid #d29922; }
.sev-low { background: #3fb95030; color: #3fb950; border: 1px solid #3fb950; }
.result-card h2 {
  color: var(--text-bright);
  font-size: 1.1rem;
  margin-bottom: 12px;
  line-height: 1.5;
}
.result-card h3 {
  color: var(--accent-blue);
  font-size: 0.9rem;
  margin: 16px 0 8px;
  font-weight: 700;
}
.result-card ul {
  padding-left: 20px;
  font-size: 0.88rem;
  line-height: 1.8;
  color: var(--text);
}
.result-card li { margin-bottom: 4px; }
.result-card .warn-box {
  background: #f8514915;
  border: 1px solid #f85149;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 0.85rem;
  color: #ffa0a0;
  margin: 12px 0;
}
.result-card .info-box {
  background: #58a6ff15;
  border: 1px solid var(--accent-blue);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 0.85rem;
  color: #a0c8ff;
  margin: 12px 0;
}
.result-card .tip-box {
  background: #3fb95015;
  border: 1px solid var(--accent-green);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 0.85rem;
  color: #a0f0a0;
  margin: 12px 0;
}
/* Code block */
.code-wrap {
  position: relative;
  margin: 14px 0;
}
.code-label {
  font-family: 'SFMono-Regular', 'Consolas', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
  background: var(--bg-tertiary);
  padding: 4px 12px;
  border-radius: 6px 6px 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
  display: inline-block;
}
pre {
  background: #010409;
  border: 1px solid var(--border);
  border-radius: 0 6px 6px 6px;
  padding: 16px;
  overflow-x: auto;
  font-family: 'SFMono-Regular', 'Consolas', monospace;
  font-size: 0.8rem;
  line-height: 1.6;
  color: #e6edf3;
}
.copy-btn {
  position: absolute;
  top: 28px;
  right: 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 0.72rem;
  cursor: pointer;
  color: var(--text-muted);
  font-family: 'SFMono-Regular', 'Consolas', monospace;
  transition: all 0.2s;
}
.copy-btn:hover { color: var(--text-bright); border-color: var(--accent-blue); }
.copy-btn.copied { color: #fff; background: var(--accent-green); border-color: var(--accent-green); }
/* Nav buttons */
.nav-row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.nav-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 18px;
  cursor: pointer;
  font-size: 0.85rem;
  color: var(--text);
  font-family: -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif;
  transition: all 0.2s;
}
.nav-btn:hover { border-color: var(--accent-blue); color: var(--text-bright); }
.nav-btn.restart { border-color: var(--accent-red); color: var(--accent-red); }
.nav-btn.restart:hover { background: #f8514920; }
/* Syntax highlight colors */
.kw { color: #ff7b72; }
.fn { color: #d2a8ff; }
.cm { color: #8b949e; font-style: italic; }
.st { color: #a5d6ff; }
.nm { color: #79c0ff; }
.pp { color: #ffa657; }
/* Table - mobile対応 */
.data-table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 12px 0;
  border-radius: 6px;
  border: 1px solid var(--border);
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
  display: block;
  overflow-x: auto;
}
.data-table th {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  padding: 8px 12px;
  color: var(--text-muted);
  text-align: left;
  font-family: 'SFMono-Regular', 'Consolas', monospace;
  white-space: nowrap;
}
.data-table td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  color: var(--text);
}
.data-table tr:nth-child(even) td { background: var(--bg-tertiary); }
/* Tag */
.tag {
  display: inline-block;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 7px;
  font-size: 0.75rem;
  font-family: 'SFMono-Regular', 'Consolas', monospace;
  color: var(--accent-blue);
}
/* -- Search UI -- */
#search-panel {
  max-width: 760px;
  margin: 0 auto 20px;
  position: relative;
}
#search-input {
  width: 100%;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 44px 11px 16px;
  color: var(--text-bright);
  font-size: 0.9rem;
  font-family: -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
#search-input:focus { border-color: var(--accent-blue); }
#search-input::placeholder { color: var(--text-muted); }
#search-clear {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text-muted);
  cursor: pointer; font-size: 1rem;
  display: none;
}
#search-clear:hover { color: var(--text-bright); }
#search-results {
  position: absolute;
  left: 0; right: 0; top: calc(100% + 4px);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 10px;
  max-height: 320px;
  overflow-y: auto;
  z-index: 100;
  display: none;
  box-shadow: 0 8px 24px #00000060;
}
.search-item {
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.search-item:last-child { border-bottom: none; }
.search-item:hover { background: var(--bg-tertiary); }
.search-item-title {
  font-size: 0.88rem;
  color: var(--text-bright);
  margin-bottom: 2px;
}
.search-item-cat {
  font-size: 0.75rem;
  color: var(--text-muted);
}
.search-item mark {
  background: #d2992260;
  color: var(--accent-yellow);
  border-radius: 2px;
  padding: 0 2px;
}
.search-empty {
  padding: 16px;
  color: var(--text-muted);
  font-size: 0.85rem;
  text-align: center;
}
/* -- Log Analyzer -- */
#log-analyzer {
  max-width: 760px;
  margin: 0 auto 20px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
#log-analyzer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  cursor: pointer;
  user-select: none;
}
#log-analyzer-header:hover { background: var(--bg-tertiary); }
#log-analyzer-title {
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--accent-purple);
}
#log-analyzer-toggle { color: var(--text-muted); font-size: 0.8rem; }
#log-analyzer-body { display: none; padding: 0 16px 16px; }
#log-input {
  width: 100%;
  background: #010409;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  color: #e6edf3;
  font-size: 0.78rem;
  font-family: 'SFMono-Regular', 'Consolas', monospace;
  resize: vertical;
  min-height: 100px;
  outline: none;
  margin-bottom: 10px;
}
#log-input:focus { border-color: var(--accent-purple); }
#log-analyze-btn {
  background: var(--accent-purple);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 8px 20px;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  font-family: -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif;
  transition: opacity 0.2s;
}
#log-analyze-btn:hover { opacity: 0.85; }
#log-results { margin-top: 12px; }
.log-match {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.log-match:hover { border-color: var(--accent-purple); background: var(--bg); }
.log-match-conf {
  font-size: 0.7rem;
  font-family: 'SFMono-Regular', 'Consolas', monospace;
  background: var(--accent-purple);
  color: #000;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 700;
  white-space: nowrap;
}
.log-match-info { flex: 1; }
.log-match-title { font-size: 0.88rem; color: var(--text-bright); }
.log-match-reason { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
/* -- Chip selector -- */
#chip-selector {
  max-width: 760px;
  margin: 0 auto 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.chip-label { font-size: 0.8rem; color: var(--text-muted); }
.chip-btn {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 0.78rem;
  cursor: pointer;
  color: var(--text-muted);
  font-family: 'SFMono-Regular', 'Consolas', monospace;
  transition: all 0.2s;
}
.chip-btn:hover { border-color: var(--accent-blue); color: var(--text); }
.chip-btn.active {
  background: var(--accent-blue);
  color: #000;
  border-color: var(--accent-blue);
  font-weight: 700;
}
/* -- Chip warning banner -- */
#chip-warn {
  max-width: 760px;
  margin: 0 auto 12px;
  background: #bc8cff18;
  border: 1px solid var(--accent-purple);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 0.82rem;
  color: #d0aaff;
  display: none;
}
/* -- Copy tooltip -- */
.copy-btn {
  position: absolute;
  top: 28px;
  right: 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 0.72rem;
  cursor: pointer;
  color: var(--text-muted);
  font-family: 'SFMono-Regular', 'Consolas', monospace;
  transition: all 0.2s;
}
.copy-btn:hover { color: var(--text-bright); border-color: var(--accent-blue); }
.copy-btn.copied { color: #fff; background: var(--accent-green); border-color: var(--accent-green); }
</style>
</head>
<body style="background:#0d1117;color:#e6edf3;margin:0">
<div class="app-header">
  <h1>[ツール] ESP32 ArduinoIDE デバッグ診断ツリー<span class="version-badge">v3.0</span></h1>
  <p>症状を選んで質問に答えると、根本原因・対処法・診断コードが表示されます</p>
</div>

<!-- Search Panel -->
<div id="search-panel">
  <input type="text" id="search-input" placeholder=" キーワード検索（例: スタック、Mutex、ADC、UART...）" autocomplete="off">
  <button id="search-clear">x</button>
  <div id="search-results"></div>
</div>

<!-- Log Analyzer -->
<div id="log-analyzer">
  <div id="log-analyzer-header" onclick="toggleLogAnalyzer()">
    <span id="log-analyzer-title">シリアルログ簡易解析（Guru Meditation / エラーログを貼り付け）</span>
    <span id="log-analyzer-toggle">v 開く</span>
  </div>
  <div id="log-analyzer-body">
    <textarea id="log-input" placeholder="例: Guru Meditation Error: Core 0 panic'ed (LoadProhibited)&#10;Backtrace: 0x4008...&#10;&#10;E (12345) task_wdt: Task watchdog got triggered..."></textarea>
    <button id="log-analyze-btn" onclick="analyzeLog()">解析して診断ノードを推薦</button>
    <div id="log-results"></div>
  </div>
</div>

<!-- Chip Selector -->
<div id="chip-selector">
  <span class="chip-label">使用チップ：</span>
  <button class="chip-btn active" onclick="selectChip('ESP32',this)">ESP32</button>
  <button class="chip-btn" onclick="selectChip('ESP32-S3',this)">ESP32-S3</button>
  <button class="chip-btn" onclick="selectChip('ESP32-C3',this)">ESP32-C3</button>
  <button class="chip-btn" onclick="selectChip('ESP32-S2',this)">ESP32-S2</button>
</div>
<div id="chip-warn"></div>

<div id="progress-bar-wrap">
  <div class="progress-label" id="progress-label">診断ステップ 1/3</div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:10%"></div></div>
</div>

<div id="breadcrumb"></div>

<div id="hw-checklist-banner">
  <h3>ハードウェア基本チェックリスト（診断前に確認）</h3>
  <div class="hw-check-grid">
    <label class="hw-check-item"><input type="checkbox"> 電源電圧が 3.3V ±5% 以内か</label>
    <label class="hw-check-item"><input type="checkbox"> USB ケーブルはデータ通信対応か（充電専用NG）</label>
    <label class="hw-check-item"><input type="checkbox"> ブレッドボード・コネクタの接触は確実か</label>
    <label class="hw-check-item"><input type="checkbox"> 3.3V/5V の混在接続がないか</label>
    <label class="hw-check-item"><input type="checkbox"> GPIO0/2/12/15 を外部回路が引っ張っていないか</label>
    <label class="hw-check-item"><input type="checkbox"> 未使用の入力ピンにプルアップ・プルダウンがあるか</label>
    <label class="hw-check-item"><input type="checkbox"> ADC を使う場合は ADC1 のみか（Wi-Fi使用時）</label>
    <label class="hw-check-item"><input type="checkbox"> 周辺にモーター・リレー・スイッチング電源がないか</label>
    <label class="hw-check-item"><input type="checkbox"> 筐体内の温度が適切か（密閉・高温環境でないか）</label>
  </div>
</div>

<div id="tree-container"></div>

<script>
// ========================================================
//  TREE DATA
// ========================================================

const NODES = {

// ---------------------------------------------------------
// ROOT
// ---------------------------------------------------------
root: {
  type: 'question',
  title: '症状のカテゴリを選んでください',
  body: 'まず最初に確認：<strong>サードパーティ製ライブラリを一時的に外して（コメントアウト）、標準ライブラリだけで再現しますか？</strong>再現しない場合はライブラリ競合が原因の可能性があります。',
  isRoot: true,

    'ESP32固有の注意：標準 FreeRTOS の uxTaskGetStackHighWaterMark はワード数を返しますが、ESP-IDF（Arduino ESP32 BSP）の実装はスタックポインタ差分をそのままバイト数で返します。他のマイコン（STM32等）から移植する場合は × 4 の換算が不要になります',
    'Tips:【Tips】単位の歴史的背景：現在の Arduino ESP32 Core (v2.x以降) では xTaskCreateUniversal の引数はバイト単位ですが、古いバージョンや他の FreeRTOS 環境ではワード単位（1ワード=4バイト）で指定する場合がありました。古いプロジェクトを移植する際は設定値が 4 倍小さくなっていないか確認してください',
    'uxTaskGetStackHighWaterMark(handle) で最小残量を確認する',
    '大きな配列・構造体はグローバルまたは static にする',
    '再帰呼び出しを避ける'

// 【挿入位置】loop() 内または受信タスク内
// ===================================================

// パターン1: タイムアウトでパケット境界を検出
uint8_t rxBuf[128];
int rxIdx = 0;
uint32_t lastByteMs = 0;

void loop() {
  while (Serial2.available()) {
    rxBuf[rxIdx++] = Serial2.read();
    lastByteMs = millis();
    if (rxIdx >= sizeof(rxBuf)) rxIdx = 0; // オーバーフロー防止
  }
  // 5ms 無受信 -> パケット完了とみなす
  if (rxIdx > 0 && millis() - lastByteMs > 5) {
    processPacket(rxBuf, rxIdx);
    rxIdx = 0;
  }
}

// パターン2: ヘッダバイト同期
void syncReceive() {
  const uint8_t HEADER = 0xAA;
  const int PKT_LEN = 8;
  uint8_t buf[PKT_LEN];

  if (Serial2.available() >= PKT_LEN) {
    if (Serial2.peek() == HEADER) {
      Serial2.readBytes(buf, PKT_LEN);
      processPacket(buf, PKT_LEN);
    } else {
      Serial2.read(); // ヘッダでなければ1バイト捨てて再同期
    }
  }
}`
},

let history = [];
let currentNodeId = 'root';
let currentChip = 'ESP32';

// -- Chip selector --------------------------------------
const CHIP_WARNINGS = {
  'ESP32-S3': 'ESP32-S3 選択中：ADC2 の Wi-Fi 制約は改善されています。PSRAM は最大 8MB（オクタル SPI）。USB OTG 内蔵。AI アクセラレータあり。',
  'ESP32-C3': 'ESP32-C3 選択中：シングルコア RISC-V です。xTaskCreatePinnedToCore で core=1 を指定しないでください。PSRAM は使用不可。Xtensa 専用コードは動作しません。',
  'ESP32-S2': 'ESP32-S2 選択中：シングルコア・BLE なし（Wi-Fi のみ）。USB OTG 内蔵。PSRAM は最大 4MB。',
  'ESP32': ''
};

function selectChip(chip, btn) {
  currentChip = chip;
  document.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const warn = document.getElementById('chip-warn');
  const msg = CHIP_WARNINGS[chip] || '';
  warn.textContent = msg;
  warn.style.display = msg ? 'block' : 'none';
}

// -- Search ---------------------------------------------
function buildSearchIndex() {
  const index = [];
  for (const [id, node] of Object.entries(NODES)) {
    if (!node.title) continue;
    const text = [
      node.title,
      node.cause || '',
      (node.fix || []).join(' '),
      node.code || '',
      node.info || ''
    ].join(' ').toLowerCase();
    index.push({ id, title: node.title, text, type: node.type });
  }
  return index;
}
const SEARCH_INDEX = buildSearchIndex();

function highlight(str, query) {
  if (!query) return str;
  const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return str.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
}

function doSearch(query) {
  const q = query.trim().toLowerCase();
  const resultsEl = document.getElementById('search-results');
  const clearBtn = document.getElementById('search-clear');
  clearBtn.style.display = q ? 'block' : 'none';
  if (!q) { resultsEl.style.display = 'none'; return; }
  const hits = SEARCH_INDEX.filter(n => n.text.includes(q) && n.type === 'result')
    .slice(0, 10);
  resultsEl.innerHTML = '';
  resultsEl.style.display = 'block';
  if (!hits.length) {
    resultsEl.innerHTML = '<div class="search-empty">該当する診断ノードが見つかりませんでした</div>';
    return;
  }
  hits.forEach(h => {
    const item = document.createElement('div');
    item.className = 'search-item';
    item.innerHTML = `<div class="search-item-title">${highlight(h.title, query)}</div>
      <div class="search-item-cat">-> ${h.id}</div>`;
    item.onclick = () => {
      history = [];
      currentNodeId = h.id;
      document.getElementById('search-input').value = '';
      resultsEl.style.display = 'none';
      clearBtn.style.display = 'none';
      render();
    };
    resultsEl.appendChild(item);
  });
}

document.getElementById('search-input').addEventListener('input', e => doSearch(e.target.value));
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    e.target.value = '';
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('search-clear').style.display = 'none';
  }
});
document.getElementById('search-clear').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-clear').style.display = 'none';
});
document.addEventListener('click', e => {
  if (!document.getElementById('search-panel').contains(e.target)) {
    document.getElementById('search-results').style.display = 'none';
  }
});

// -- Log Analyzer ---------------------------------------
let logAnalyzerOpen = false;
function toggleLogAnalyzer() {
  logAnalyzerOpen = !logAnalyzerOpen;
  document.getElementById('log-analyzer-body').style.display = logAnalyzerOpen ? 'block' : 'none';
  document.getElementById('log-analyzer-toggle').innerHTML = logAnalyzerOpen ? '^ 閉じる' : 'v 開く';
}

const LOG_PATTERNS = [
  { pattern: /LoadProhibited|StoreProhibited/i, node: 'r_null_ptr', title: 'NULL ポインタ参照 / 不正アドレスアクセス', reason: 'LoadProhibited/StoreProhibited を検出' },
  { pattern: /IllegalInstruction/i, node: 'r_illegal_instruction', title: '不正命令（IRAM_ATTR 不足）', reason: 'IllegalInstruction を検出' },
  { pattern: /InstrFetchProhibited/i, node: 'r_corrupt_pc', title: 'プログラムカウンタ破壊', reason: 'InstrFetchProhibited を検出' },
  { pattern: /DoubleException/i, node: 'r_double_exception', title: 'DoubleException（スタック破壊）', reason: 'DoubleException を検出' },
  { pattern: /abort\(\)/i, node: 'r_abort_called', title: 'abort() 呼び出し', reason: 'abort() を検出' },
  { pattern: /task_?wdt|Task watchdog/i, node: 'r_twdt', title: 'Task Watchdog タイムアウト（TWDT）', reason: 'Task Watchdog を検出' },
  { pattern: /int_?wdt|Interrupt watchdog/i, node: 'r_iwdt', title: 'Interrupt Watchdog タイムアウト', reason: 'Interrupt Watchdog を検出' },
  { pattern: /stack overflow|Stack canary/i, node: 'r_stackoverflow', title: 'スタックオーバーフロー', reason: 'Stack overflow/canary を検出' },
  { pattern: /brownout/i, node: 'r_brownout', title: 'ブラウンアウト（電源電圧低下）', reason: 'Brownout を検出' },
  { pattern: /heap.*fragment|malloc.*fail|no free memory/i, node: 'r_heap_fragment', title: 'ヒープ断片化 / メモリ不足', reason: 'ヒープエラーを検出' },
  { pattern: /prvTaskExitError|task.*return/i, node: 'r_task_return', title: 'タスク関数からの不正 return', reason: 'prvTaskExitError を検出' },
  { pattern: /IRAM_ATTR|cache disabled/i, node: 'r_isr_iram', title: 'ISR から非 IRAM 関数を呼び出している', reason: 'IRAM/キャッシュ関連エラーを検出' },
  { pattern: /panic.*(Core [01])/i, node: 'crash_guru', title: 'Guru Meditation Error', reason: 'Core panic を検出' },
  { pattern: /rst:0x[0-9a-f]+\s*\(BROWNOUT\)/i, node: 'r_brownout', title: 'ブラウンアウトリセット', reason: 'リセット理由 BROWNOUT を検出' },
  { pattern: /rst:.*\(PANIC\)/i, node: 'r_null_ptr', title: 'PANIC リセット', reason: 'リセット理由 PANIC を検出' },
];

const BACKTRACE_PATTERN = /Backtrace:/i;

function analyzeLog() {
  const log = document.getElementById('log-input').value;
  const resultsEl = document.getElementById('log-results');
  resultsEl.innerHTML = '';
  if (!log.trim()) {
    resultsEl.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">ログを入力してください</p>';
    return;
  }

  // Backtrace ガイド
  if (BACKTRACE_PATTERN.test(log)) {
    const btDiv = document.createElement('div');
    btDiv.style.cssText = 'background:var(--bg-tertiary);border:1px solid var(--accent-blue);border-radius:8px;padding:12px 14px;margin-bottom:10px;font-size:0.85rem;line-height:1.6;';
    btDiv.innerHTML = `<span style="color:var(--accent-blue);font-weight:700;">Backtrace を検出</span><br>
      <span style="color:var(--text);">アドバイス：ログに <code style="color:var(--accent-cyan);background:var(--bg);padding:1px 5px;border-radius:3px;">Backtrace:</code> が含まれています。これを解析するには、Arduino IDE のツールメニューから <strong style="color:var(--text-bright);">「ESP Exception Decoder」</strong> を使用すると、エラーが発生したコードの行数を特定できます。</span>`;
    resultsEl.appendChild(btDiv);
  }

  const matches = LOG_PATTERNS.filter(p => p.pattern.test(log));
  if (!matches.length) {
    resultsEl.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">パターンが一致する診断ノードが見つかりませんでした。「突然リセット」カテゴリから手動で診断してください。</p>';
    return;
  }
  matches.forEach((m, i) => {
    const conf = i === 0 ? '最有力' : '候補';
    const el = document.createElement('div');
    el.className = 'log-match';
    el.innerHTML = `<span class="log-match-conf">${conf}</span>
      <div class="log-match-info">
        <div class="log-match-title">${m.title}</div>
        <div class="log-match-reason">${m.reason} -> クリックで診断ノードへ</div>
      </div>`;
    el.onclick = () => {
      history = [];
      currentNodeId = m.node;
      logAnalyzerOpen = false;
      document.getElementById('log-analyzer-body').style.display = 'none';
      document.getElementById('log-analyzer-toggle').innerHTML = 'v 開く';
      render();
    };
    resultsEl.appendChild(el);
  });
}

// -- Core Render Functions -------------------------------
function getNode(id) { return NODES[id]; }

function renderRoot() {
  const node = NODES.root;
  const el = document.createElement('div');
  el.className = 'node-card';
  el.innerHTML = `<h2>${node.title}</h2><p style="font-size:0.88rem;color:var(--accent-yellow);background:#d2992218;border:1px solid var(--accent-yellow);border-radius:8px;padding:10px 14px;margin-bottom:12px;">Tips: ${node.body}</p>`;
  const grid = document.createElement('div');
  grid.className = 'cat-grid';
  node.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.style.setProperty('--accent', c.color);
    btn.style.borderColor = 'var(--border)';
    btn.innerHTML = `<span class="cat-name" style="color:${c.color}">${c.label.replace(/^\[[^\]]+\]\s*/, '')}</span><span class="cat-desc">${c.desc}</span>`;
    btn.onclick = () => navigate(c.next, c.label);
    btn.onmouseenter = () => btn.style.borderColor = c.color;
    btn.onmouseleave = () => btn.style.borderColor = 'var(--border)';
    grid.appendChild(btn);
  });
  el.appendChild(grid);
  return el;
}

function renderQuestion(id, node) {
  const el = document.createElement('div');
  el.className = 'node-card';
  el.innerHTML = `<h2>${node.title}</h2>${node.body ? `<p>${node.body}</p>` : ''}`;
  const list = document.createElement('div');
  list.className = 'choice-list';
  node.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = c.label;
    btn.onclick = () => navigate(c.next, c.label);
    list.appendChild(btn);
  });
  el.appendChild(list);
  if (history.length > 0) el.appendChild(buildNavRow());
  return el;
}

function renderResult(id, node) {
  const el = document.createElement('div');
  el.className = 'result-card';
  const sevClass = {high:'sev-high', medium:'sev-medium', low:'sev-low'}[node.severity] || 'sev-medium';
  const sevLabel = {high:' HIGH', medium:' MEDIUM', low:' LOW'}[node.severity] || node.severity;
  let html = `<span class="severity-badge ${sevClass}">${sevLabel}</span>`;
  // Chip-specific badge
  if (currentChip !== 'ESP32') {
    html += `<span class="severity-badge" style="background:#bc8cff30;color:#bc8cff;border:1px solid #bc8cff;margin-left:6px;">${currentChip} 選択中</span>`;
  }
  html += `<h2>${node.title}</h2>`;
  html += `<p>${node.cause}</p>`;
  if (node.warn) html += `<div class="warn-box">${node.warn}</div>`;
  if (node.info) html += `<div class="info-box"><pre style="background:none;border:none;padding:0;color:inherit;font-family:inherit;font-size:inherit;white-space:pre-wrap">${node.info}</pre></div>`;
  if (node.tip) html += `<div class="tip-box">${node.tip}</div>`;
  if (node.fix && node.fix.length) {
    html += `<h3>対処法</h3><ul>` + node.fix.map(f => `<li>${f}</li>`).join('') + `</ul>`;
  }
  el.innerHTML = html;
  if (node.code) {
    const wrap = document.createElement('div');
    wrap.className = 'code-wrap';
    const label = document.createElement('div');
    label.className = 'code-label';
    label.textContent = '// 診断コード';
    const pre = document.createElement('pre');
    pre.textContent = node.code;
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = 'COPY';
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(node.code).then(() => {
        copyBtn.innerHTML = 'COPIED OK';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = 'COPY'; copyBtn.classList.remove('copied'); }, 2000);
      }).catch(() => {
        // Fallback for older browsers
        const ta = document.createElement('textarea');
        ta.value = node.code;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copyBtn.innerHTML = 'COPIED OK';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = 'COPY'; copyBtn.classList.remove('copied'); }, 2000);
      });
    };
    wrap.appendChild(label);
    wrap.appendChild(pre);
    wrap.appendChild(copyBtn);
    el.appendChild(wrap);
  }
  // Chip differences button
  const chipBtn = document.createElement('button');
  chipBtn.className = 'choice-btn';
  chipBtn.style.marginTop = '10px';
  chipBtn.style.fontSize = '0.8rem';
  chipBtn.innerHTML = 'チップ別の差異・制約を確認する';
  chipBtn.onclick = () => navigate('r_chip_differences', 'チップ別差異');
  el.appendChild(chipBtn);
  el.appendChild(buildNavRow());
  return el;
}

function buildNavRow() {
  const row = document.createElement('div');
  row.className = 'nav-row';
  if (history.length > 0) {
    const backBtn = document.createElement('button');
    backBtn.className = 'nav-btn';
    backBtn.innerHTML = '<- 前に戻る';
    backBtn.onclick = () => goBack();
    row.appendChild(backBtn);
  }
  const restartBtn = document.createElement('button');
  restartBtn.className = 'nav-btn restart';
  restartBtn.innerHTML = '最初からやり直す';
  restartBtn.onclick = () => restart();
  row.appendChild(restartBtn);
  return row;
}

function navigate(nodeId, label) {
  history.push({ nodeId: currentNodeId, label });
  currentNodeId = nodeId;
  render();
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  currentNodeId = prev.nodeId;
  render();
}

function restart() {
  history = [];
  currentNodeId = 'root';
  render();
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (history.length === 0) { bc.style.display = 'none'; return; }
  bc.style.display = 'flex';
  bc.innerHTML = '';
  const rootCrumb = document.createElement('span');
  rootCrumb.className = 'crumb';
  rootCrumb.textContent = 'TOP';
  rootCrumb.onclick = restart;
  bc.appendChild(rootCrumb);
  history.forEach((h, i) => {
    const sep = document.createElement('span'); sep.innerHTML = ' > '; bc.appendChild(sep);
    const crumb = document.createElement('span');
    const shortLabel = h.label.replace(/&#x[0-9A-Fa-f]+;/g, '').trim().substring(0, 20);
    crumb.textContent = shortLabel;
    if (i < history.length - 1) {
      crumb.className = 'crumb';
      crumb.onclick = () => {
        const target = history[i + 1];
        history = history.slice(0, i + 1);
        currentNodeId = target.nodeId;
        render();
      };
    } else {
      crumb.style.color = 'var(--text-muted)';
    }
    bc.appendChild(crumb);
  });
  const pw = document.getElementById('progress-bar-wrap');
  const pf = document.getElementById('progress-fill');
  const pl = document.getElementById('progress-label');
  pw.style.display = 'block';
  const pct = Math.min(100, 15 + history.length * 20);
  pf.style.width = pct + '%';
  pl.textContent = `診断ステップ ${history.length}`;
}

function updateHWChecklist() {
  const banner = document.getElementById('hw-checklist-banner');
  banner.style.display = (history.length > 0) ? 'block' : 'none';
}

function render() {
  updateBreadcrumb();
  updateHWChecklist();
  const container = document.getElementById('tree-container');
  container.innerHTML = '';
  const node = NODES[currentNodeId];
  if (!node) {
    container.innerHTML = `<div class="node-card"><h2>ノードが見つかりません: ${currentNodeId}</h2></div>`;
    return;
  }
  let el;
  if (node.isRoot) el = renderRoot();
  else if (node.type === 'question') el = renderQuestion(currentNodeId, node);
  else if (node.type === 'result') el = renderResult(currentNodeId, node);
  container.appendChild(el);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Init
(function() {
  function init() {
    try { render(); } catch(e) {
      var c = document.getElementById('tree-container');
      if (c) c.innerHTML = '<div style="color:#f85149;padding:20px;font-family:monospace;white-space:pre">JS Error: ' + e.message + '\n' + e.stack + '</div>';
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>
